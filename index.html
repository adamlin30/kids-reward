<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="任務獎勵">
<title>任務獎勵系統</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #2ec4b6;
    --teal-dark: #1a9e92;
    --teal-light: #e0f7f5;
    --gold: #f5c518;
    --gold-dark: #c9a000;
    --gold-light: #fff8dc;
    --bg: #f0faf9;
    --card: #ffffff;
    --text: #1a2e2d;
    --muted: #7a9e9b;
    --border: #d4eeeb;
    --radius: 18px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ===== TOP PLAYER SWITCHER ===== */
  .player-switcher {
    display: flex;
    gap: 10px;
    padding: 16px 16px 0;
  }
  .player-btn {
    flex: 1;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .player-btn.active {
    border-color: var(--teal);
    background: var(--teal-light);
  }
  .player-btn .p-avatar { font-size: 24px; }
  .player-btn .p-name { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .player-btn .p-coins { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .player-btn.active .p-name { color: var(--teal-dark); }

  /* ===== HEADER ===== */
  .header {
    margin: 12px 16px 0;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    border-radius: 22px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    right: -20px; top: -20px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header-avatar { font-size: 42px; line-height: 1; }
  .header-info { flex: 1; }
  .header-name { font-size: 22px; font-weight: 800; color: white; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
  .coin-badge {
    background: var(--gold);
    border-radius: 50px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 800;
    font-size: 18px;
    color: var(--gold-dark);
    box-shadow: 0 3px 10px rgba(245,197,24,0.4);
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 14px 16px 0;
  }
  .tab {
    flex: 1;
    padding: 10px 6px;
    border-radius: 50px;
    border: 2px solid var(--border);
    background: var(--card);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--teal);
    color: white;
    border-color: var(--teal);
  }

  /* ===== CONTENT ===== */
  .content { padding: 14px 16px 0; }
  .page { display: none; }
  .page.active { display: block; }
  .section-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 12px;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
  }
  .task-card.done { opacity: 0.5; }
  .task-icon { font-size: 28px; width: 44px; text-align: center; flex-shrink: 0; }
  .task-left { flex: 1; }
  .task-tags { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
  }
  .tag-daily { background: #dbeafe; color: #1e4fad; }
  .tag-sport { background: #fce7f3; color: #9d174d; }
  .tag-school { background: #ede9fe; color: #5b21b6; }
  .tag-read { background: #d1fae5; color: #065f46; }
  .tag-home { background: #fef3c7; color: #92400e; }
  .tag-music { background: #fce7f3; color: #86198f; }
  .task-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .task-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .checkin-btn {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .checkin-btn:active { transform: scale(0.93); }
  .checkin-btn.done-btn {
    background: #e8f5f4;
    color: var(--teal-dark);
    cursor: default;
  }

  /* ===== REWARD CARD ===== */
  .reward-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .reward-emoji { font-size: 32px; width: 48px; text-align: center; flex-shrink: 0; }
  .reward-info { flex: 1; }
  .reward-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .reward-cost { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .redeem-btn {
    background: var(--gold);
    color: var(--gold-dark);
    border: none;
    border-radius: 50px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .redeem-btn:active { transform: scale(0.93); }
  .redeem-btn:disabled {
    background: #f0f0f0;
    color: #aaa;
    cursor: default;
  }

  /* ===== HISTORY ===== */
  .history-item {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-label { font-size: 14px; color: var(--text); }
  .history-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .history-delta { font-size: 15px; font-weight: 800; }
  .delta-pos { color: var(--teal-dark); }
  .delta-neg { color: #e55; }
  
    .reset-btn {
    width: 100%;
    padding: 12px;
    background: #fee2e2;
    color: #b91c1c;
    border: 2px dashed #f87171;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    margin-top: 16px;
    margin-bottom: 20px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--teal-dark);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== ADMIN PANEL ===== */
  .admin-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .admin-overlay.open { display: flex; }
  .admin-panel {
    background: var(--card);
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .admin-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
  .admin-row { margin-bottom: 12px; }
  .admin-row label { font-size: 13px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 4px; }
  .admin-row input, .admin-row select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .admin-save {
    width: 100%;
    padding: 14px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    margin-top: 8px;
  }
  .admin-cancel {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--muted);
    border: none;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-btn {
    width: 100%;
    padding: 12px;
    background: var(--teal-light);
    color: var(--teal-dark);
    border: 2px dashed var(--teal);
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    margin-bottom: 14px;
    margin-top: 4px;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #e55;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    flex-shrink: 0;
  }
  .empty-msg { color: var(--muted); font-size: 14px; padding: 20px 0; text-align: center; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    flex: 1;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--teal-dark); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<div class="player-switcher">
  <div class="player-btn active" id="p0-btn" onclick="switchPlayer(0)">
    <div class="p-avatar" id="p0-avatar">🌸</div>
    <div class="p-name" id="p0-name">Abby</div>
    <div class="p-coins" id="p0-coins">🪙 0</div>
  </div>
  <div class="player-btn" id="p1-btn" onclick="switchPlayer(1)">
    <div class="p-avatar" id="p1-avatar">⚡</div>
    <div class="p-name" id="p1-name">Adam</div>
    <div class="p-coins" id="p1-coins">🪙 0</div>
  </div>
</div>

<div class="header">
  <div class="header-avatar" id="cur-avatar">🌸</div>
  <div class="header-info">
    <div class="header-name" id="cur-name">Abby</div>
    <div class="header-sub" id="cur-sub">今日任務進行中</div>
  </div>
  <div class="coin-badge">
    <span>🪙</span>
    <span id="cur-coins">0</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('tasks')">📋 每日任務</button>
  <button class="tab" onclick="showPage('rewards')">🎁 獎品兌換</button>
  <button class="tab" onclick="showPage('history')">📜 紀錄</button>
</div>

<div class="content">
  <div id="page-tasks" class="page active">
    <div class="section-title">📋 每日任務</div>
    <div id="task-list"></div>
    <button class="add-btn" onclick="openAddTask()">＋ 新增任務</button>
  </div>

  <div id="page-rewards" class="page">
    <div class="section-title">🎁 可兌換獎品</div>
    <div id="reward-list"></div>
    <button class="add-btn" onclick="openAddReward()">＋ 新增獎品</button>
  </div>

  <div id="page-history" class="page">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-label">累計金幣</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-tasks">0</div>
        <div class="stat-label">今日完成</div>
      </div>
    </div>
	<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <div class="section-title" style="margin-bottom: 0;">📜 歷史紀錄</div>
      <button onclick="resetSystem()" style="background: #fee2e2; color: #b91c1c; border: 1px solid #f87171; padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer;">
        ⚠️ 重置測試紀錄
      </button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- Add Task Panel -->
<div class="admin-overlay" id="task-overlay">
  <div class="admin-panel">
    <div class="admin-title">新增任務</div>
    <div class="admin-row">
      <label>任務名稱</label>
      <input type="text" id="new-task-name" placeholder="例：寫日記" />
    </div>
    <div class="admin-row">
      <label>分類</label>
      <select id="new-task-cat">
        <option value="music">🎵 音樂</option>
        <option value="sport">🏃 運動</option>
        <option value="school">📚 學校</option>
        <option value="read">📖 閱讀</option>
        <option value="home">🏠 家務</option>
      </select>
    </div>
    <div class="admin-row">
      <label>獎勵金幣</label>
      <input type="number" id="new-task-coins" value="10" min="1" />
    </div>
    <button class="admin-save" onclick="saveNewTask()">新增</button>
    <button class="admin-cancel" onclick="closeOverlays()">取消</button>
  </div>
</div>

<!-- Add Reward Panel -->
<div class="admin-overlay" id="reward-overlay">
  <div class="admin-panel">
    <div class="admin-title">新增獎品</div>
    <div class="admin-row">
      <label>獎品名稱</label>
      <input type="text" id="new-reward-name" placeholder="例：買珍珠奶茶" />
    </div>
    <div class="admin-row">
      <label>Emoji 圖示</label>
      <input type="text" id="new-reward-emoji" placeholder="例：🧋" />
    </div>
    <div class="admin-row">
      <label>兌換所需金幣</label>
      <input type="number" id="new-reward-cost" value="50" min="1" />
    </div>
    <button class="admin-save" onclick="saveNewReward()">新增</button>
    <button class="admin-cancel" onclick="closeOverlays()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DEFAULT DATA — edit these arrays to change initial content
// ============================================================
const DEFAULT_TASKS = [
  { id:"t1", name:"練習鋼琴20分鐘", cat:"music", coins:10 },
  { id:"t2", name:"練習鋼琴30分鐘", cat:"music", coins:20 },
  { id:"t3", name:"練習鋼琴40分鐘", cat:"music", coins:40 },
  { id:"t4", name:"運動1小時",       cat:"sport", coins:30 },
  { id:"t5", name:"寫評量1回",       cat:"school", coins:10 },
  { id:"t6", name:"念英文",          cat:"read",  coins:10 },
];

const DEFAULT_REWARDS = [
  { id:"r1", emoji:"🎮", name:"打電動30分鐘", cost:50 },
];

const PLAYERS = [
  { name:"Abby", avatar:"🌸" },
  { name:"Adam", avatar:"⚡" },
];

// ============================================================
// TAG CONFIG
// ============================================================
const TAG_MAP = {
  music:  { cls:"tag-music",  label:"音樂" },
  sport:  { cls:"tag-sport",  label:"運動" },
  school: { cls:"tag-school", label:"學校" },
  read:   { cls:"tag-read",   label:"閱讀" },
  home:   { cls:"tag-home",   label:"家務" },
};

const CAT_ICON = {
  music:"🎵", sport:"🏃", school:"📚", read:"📖", home:"🏠"
};

// ============================================================
// STATE
// ============================================================
const today = new Date().toDateString();
let curPlayer = 0;

function loadState() {
  try {
    const raw = localStorage.getItem("kidreward_v3");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)),
    rewards: JSON.parse(JSON.stringify(DEFAULT_REWARDS)),
    players: PLAYERS.map(() => ({ coins:0, earned:0, done:{}, lastDay:"", history:[] }))
  };
}

function save() {
  localStorage.setItem("kidreward_v3", JSON.stringify(state));
}

let state = loadState();
// Ensure players array length matches
while (state.players.length < PLAYERS.length)
  state.players.push({ coins:0, earned:0, done:{}, lastDay:"", history:[] });

function resetDailyIfNeeded(ps) {
  if (ps.lastDay !== today) {
    ps.done = {};
    ps.lastDay = today;
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function switchPlayer(idx) {
  curPlayer = idx;
  document.getElementById("p0-btn").classList.toggle("active", idx===0);
  document.getElementById("p1-btn").classList.toggle("active", idx===1);
  renderAll();
}

function showPage(name) {
  ["tasks","rewards","history"].forEach(p => {
    document.getElementById("page-"+p).classList.toggle("active", p===name);
  });
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["tasks","rewards","history"][i]===name);
  });
  if (name === "history") renderHistory();
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  const ps = state.players[curPlayer];
  resetDailyIfNeeded(ps);
  const p = PLAYERS[curPlayer];

  // Header
  document.getElementById("cur-avatar").textContent = p.avatar;
  document.getElementById("cur-name").textContent = p.name;
  document.getElementById("cur-coins").textContent = ps.coins;
  const doneCount = Object.keys(ps.done).filter(k => !k.includes("_count")).length;
  document.getElementById("cur-sub").textContent =
    doneCount > 0 ? `今日已完成 ${doneCount} 項任務！` : "今日任務進行中";

  // Switcher coins
  state.players.forEach((sp, i) => {
    document.getElementById("p"+i+"-avatar").textContent = PLAYERS[i].avatar;
    document.getElementById("p"+i+"-name").textContent = PLAYERS[i].name;
    document.getElementById("p"+i+"-coins").textContent = "💰 " + sp.coins;
  });

  renderTasks();
  renderRewards();
}

function renderTasks() {
  const ps = state.players[curPlayer];
  const el = document.getElementById("task-list");
  if (!state.tasks.length) {
    el.innerHTML = `<div class="empty-msg">還沒有任務，點下方新增吧！</div>`;
    return;
  }
  el.innerHTML = state.tasks.map(t => {
    const done = !!ps.done[t.id];
    const tm = TAG_MAP[t.cat] || TAG_MAP.school;
    const icon = CAT_ICON[t.cat] || "📌";
    const count = ps.done[t.id+"_count"] || 0;
    return `<div class="task-card ${done?'done':''}">
      <div class="task-icon">${icon}</div>
      <div class="task-left">
        <div class="task-tags">
          <span class="tag ${tm.cls}">${tm.label}</span>
        </div>
        <div class="task-name">${t.name}</div>
        <div class="task-meta">💰 ${t.coins} 金幣 &nbsp;·&nbsp; 累計 ${count} 次</div>
      </div>
      <button class="delete-btn" onclick="deleteTask('${t.id}')">🗑</button>
      ${done
        ? `<button class="checkin-btn done-btn">✓ 完成</button>`
        : `<button class="checkin-btn" onclick="checkin('${t.id}')">打卡</button>`
      }
    </div>`;
  }).join("");
}

function renderRewards() {
  const ps = state.players[curPlayer];
  const el = document.getElementById("reward-list");
  if (!state.rewards.length) {
    el.innerHTML = `<div class="empty-msg">還沒有獎品，點下方新增吧！</div>`;
    return;
  }
  el.innerHTML = state.rewards.map(r => {
    const can = ps.coins >= r.cost;
    return `<div class="reward-card">
      <div class="reward-emoji">${r.emoji}</div>
      <div class="reward-info">
        <div class="reward-name">${r.name}</div>
        <div class="reward-cost">💰 需要 ${r.cost} 金幣 ${can ? '· 可兌換！' : ''}</div>
      </div>
      <button class="delete-btn" onclick="deleteReward('${r.id}')">🗑</button>
      <button class="redeem-btn" ${can?'':'disabled'} onclick="redeem('${r.id}','${r.name}',${r.cost})">
        ${can ? '兌換' : '不足'}
      </button>
    </div>`;
  }).join("");
}

function renderHistory() {
  const ps = state.players[curPlayer];
  const items = (ps.history||[]).slice().reverse().slice(0,30);
  // Stats
  document.getElementById("stat-total").textContent = ps.earned || 0;
  const doneCount = Object.keys(ps.done).filter(k=>!k.includes("_count")).length;
  document.getElementById("stat-tasks").textContent = doneCount;
  const el = document.getElementById("history-list");
  if (!items.length) {
    el.innerHTML = `<div class="empty-msg">還沒有紀錄喔！</div>`;
    return;
  }
  el.innerHTML = items.map(h =>
    `<div class="history-item">
      <div>
        <div class="history-label">${h.label}</div>
        <div class="history-time">${h.time||''}</div>
      </div>
      <div class="history-delta ${h.delta>0?'delta-pos':'delta-neg'}">${h.delta>0?'+':''}${h.delta} 💰</div>
    </div>`
  ).join("");
}

// ============================================================
// ACTIONS
// ============================================================
function checkin(tid) {
  const ps = state.players[curPlayer];
  resetDailyIfNeeded(ps);
  if (ps.done[tid]) return;
  const task = state.tasks.find(t=>t.id===tid);
  if (!task) return;
  ps.done[tid] = true;
  ps.done[tid+"_count"] = (ps.done[tid+"_count"]||0) + 1;
  ps.coins += task.coins;
  ps.earned = (ps.earned||0) + task.coins;
  ps.history = ps.history||[];
  ps.history.push({ label:"完成："+task.name, delta:task.coins, time:timeStr() });
  save();
  renderAll();
  showToast("+" + task.coins + " 💰  打卡成功！");
}

function redeem(rid, name, cost) {
  const ps = state.players[curPlayer];
  if (ps.coins < cost) return;
  ps.coins -= cost;
  ps.history = ps.history||[];
  ps.history.push({ label:"兌換："+name, delta:-cost, time:timeStr() });
  save();
  renderAll();
  showToast("🎉 兌換成功：" + name);
}

function deleteTask(tid) {
  if (!confirm("確定要刪除這個任務嗎？")) return;
  state.tasks = state.tasks.filter(t=>t.id!==tid);
  save(); renderAll();
}

function deleteReward(rid) {
  if (!confirm("確定要刪除這個獎品嗎？")) return;
  state.rewards = state.rewards.filter(r=>r.id!==rid);
  save(); renderRewards();
}

function resetSystem() {
  if (confirm("確定要清空所有紀錄嗎？這將會刪除所有玩家的金幣與歷史紀錄！")) {
    localStorage.removeItem("kidreward_v3");
    location.reload();
  }
}

// ============================================================
// ADD TASK / REWARD
// ============================================================
function openAddTask() {
  document.getElementById("new-task-name").value = "";
  document.getElementById("new-task-coins").value = "10";
  document.getElementById("task-overlay").classList.add("open");
}

function openAddReward() {
  document.getElementById("new-reward-name").value = "";
  document.getElementById("new-reward-emoji").value = "";
  document.getElementById("new-reward-cost").value = "50";
  document.getElementById("reward-overlay").classList.add("open");
}

function closeOverlays() {
  document.querySelectorAll(".admin-overlay").forEach(o=>o.classList.remove("open"));
}

function saveNewTask() {
  const name = document.getElementById("new-task-name").value.trim();
  const cat  = document.getElementById("new-task-cat").value;
  const coins = parseInt(document.getElementById("new-task-coins").value) || 10;
  if (!name) { alert("請輸入任務名稱"); return; }
  state.tasks.push({ id:"t"+Date.now(), name, cat, coins });
  save(); closeOverlays(); renderTasks();
  showToast("任務已新增！");
}

function saveNewReward() {
  const name  = document.getElementById("new-reward-name").value.trim();
  const emoji = document.getElementById("new-reward-emoji").value.trim() || "🎁";
  const cost  = parseInt(document.getElementById("new-reward-cost").value) || 50;
  if (!name) { alert("請輸入獎品名稱"); return; }
  state.rewards.push({ id:"r"+Date.now(), emoji, name, cost });
  save(); closeOverlays(); renderRewards();
  showToast("獎品已新增！");
}

// ============================================================
// UTILS
// ============================================================
function timeStr() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

// Close overlay when clicking outside panel
document.querySelectorAll(".admin-overlay").forEach(o=>{
  o.addEventListener("click", e=>{ if(e.target===o) closeOverlays(); });
});

// ============================================================
// INIT
// ============================================================
renderAll();
</script>
</body>
</html>
